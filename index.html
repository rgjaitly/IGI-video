<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Video</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      text-align: center;
      background: #ffffff;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 6px;
    }
    p {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 12px;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      max-width: 720px;
      margin: 0 auto;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h1>Banded Mongoose IGI</h1>
  <p>Video loads automatically. Tap to enable sound.</p>

  <div class="video-container">
    <div class="overlay" onclick="enableSound()">Tap for sound</div>
    <iframe 
      id="video"
      src="https://www.youtube.com/embed/yGWa9hM_czI?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    function enableSound() {
      const iframe = document.getElementById('video');
      iframe.src = iframe.src.replace("mute=1", "mute=0");
      document.querySelector('.overlay').classList.add('hidden');
    }
  </script>

</body>
</html>
