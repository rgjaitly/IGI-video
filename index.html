<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Video</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      text-align: center;
      background: #ffffff;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 6px;
    }
    p {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 12px;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      max-width: 720px;
      margin: 0 auto;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Banded Mongoose IGI</h1>
  <p>Tap to play the video.</p>

  <div class="video-container">
    <iframe 
      src="https://player.vimeo.com/video/693114843?autoplay=1&muted=1&title=0&byline=0&portrait=0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
